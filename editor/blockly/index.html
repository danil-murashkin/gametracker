<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blockly — rules.json</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="boot-error" class="boot-error" hidden></div>
  <header>
    <strong>Blockly → rules.json</strong>
    <a class="nav-btn" href="http://localhost:8082" target="_blank" rel="noopener">Block Factory</a>
    <span class="header-divider" aria-hidden="true"></span>
    <button type="button" id="btn-demo">Демо FSM</button>
    <button type="button" id="btn-validate">Проверить</button>
    <button type="button" id="btn-export" class="primary">Скачать rules.json</button>
    <button type="button" id="btn-copy">Копировать</button>
  </header>
  <div class="layout" id="app-layout">
    <div id="workspace"></div>
    <aside>
      <p class="muted">Экспорт → <code>common/rules/rules.json</code></p>
      <p id="status" class="muted"></p>
      <h3>JSON</h3>
      <textarea id="json-out" readonly></textarea>
    </aside>
  </div>
  <script>
    (function () {
      if (location.protocol !== 'file:') {
        return;
      }
      document.addEventListener('DOMContentLoaded', function () {
        var layout = document.getElementById('app-layout');
        var err = document.getElementById('boot-error');
        if (layout) {
          layout.hidden = true;
        }
        var header = document.querySelector('header');
        if (header) {
          header.hidden = true;
        }
        err.hidden = false;
        err.innerHTML =
          '<h1>Blockly не запущен</h1>' +
          '<p>Файл <code>index.html</code> нельзя открывать двойным щелчком.</p>' +
          '<p>Запустите сервер в PowerShell:</p>' +
          '<pre>cd editor\\blockly\n.\\start.ps1</pre>' +
          '<p>Затем откройте <a href="http://localhost:8081">http://localhost:8081</a></p>';
      });
    })();
  </script>
  <script src="node_modules/blockly/blockly_compressed.js"></script>
  <script src="node_modules/blockly/blocks_compressed.js"></script>
  <script src="node_modules/blockly/msg/en.js"></script>
  <script src="blocks.js"></script>
  <script src="export.js"></script>
  <script src="app.js"></script>
</body>
</html>
